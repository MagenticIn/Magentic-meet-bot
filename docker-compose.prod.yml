services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SHARED_DATA_DIR: /data
      HF_TOKEN: ${HF_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PM_API_BASE_URL: ${PM_API_BASE_URL}
      PM_API_KEY: ${PM_API_KEY}
      API_BASE_URL: http://api:8000
    volumes:
      - shared_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pipeline:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SHARED_DATA_DIR: /data
      HF_TOKEN: ${HF_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PM_API_BASE_URL: ${PM_API_BASE_URL}
      PM_API_KEY: ${PM_API_KEY}
      API_BASE_URL: http://api:8000
      TRANSCRIPTION_BACKEND: ${TRANSCRIPTION_BACKEND:-openai}
      OPENAI_TRANSCRIPTION_LANGUAGE: ${OPENAI_TRANSCRIPTION_LANGUAGE:-}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-large-v3-turbo}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
    volumes:
      - shared_data:/data
      - model_cache:/root/.cache
    depends_on:
      redis:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SHARED_DATA_DIR: /data
      HF_TOKEN: ${HF_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PM_API_BASE_URL: ${PM_API_BASE_URL}
      PM_API_KEY: ${PM_API_KEY}
      API_BASE_URL: http://api:8000
      GOOGLE_EMAIL: ${GOOGLE_EMAIL}
      GOOGLE_PASSWORD: ${GOOGLE_PASSWORD}
      BOT_DISPLAY_NAME: ${BOT_DISPLAY_NAME:-Magentic Notetaker}
      BOT_JOIN_TIMEOUT_SEC: ${BOT_JOIN_TIMEOUT_SEC:-120}
      BOT_MAX_MEETING_DURATION_SEC: ${BOT_MAX_MEETING_DURATION_SEC:-7200}
      BOT_END_DETECTION_STABLE_POLLS: ${BOT_END_DETECTION_STABLE_POLLS:-2}
      BOT_MODE: worker
      RECORDING_OUTPUT_PATH: /data/recording.wav
    volumes:
      - shared_data:/data
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pg_data:
  shared_data:
  model_cache:
  caddy_data:
  caddy_config:
